<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#111;color:#ccc;font-size:12px;line-height:1.4;padding:40px 12px 12px}
        .nav{position:fixed;top:0;left:0;right:0;background:#1a1a1a;border-bottom:1px solid #333;padding:8px 12px;z-index:100;display:flex;justify-content:space-between;align-items:center}
        .nav-title{font-size:13px;font-weight:600;color:#fff}
        .nav-links{display:flex;gap:6px}
        .nav-link{padding:4px 10px;background:#252525;color:#888;border:1px solid #333;border-radius:4px;text-decoration:none;font-size:11px;cursor:pointer}
        .nav-link:hover{background:#333;color:#fff}
        .container{max-width:1200px;margin:0 auto}
        .stats{display:flex;gap:8px;margin-bottom:12px}
        .stat{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:10px;text-align:center}
        .stat-val{font-size:20px;font-weight:700;color:#fff}
        .stat-val.warn{color:#f59e0b}.stat-val.err{color:#ef4444}.stat-val.ok{color:#10b981}.stat-val.info{color:#6366f1}
        .stat-lbl{font-size:9px;color:#666;text-transform:uppercase;margin-top:2px}
        .grid{display:grid;grid-template-columns:1fr 320px;gap:12px}
        .panel{background:#1a1a1a;border:1px solid #333;border-radius:6px;overflow:hidden}
        .panel-hd{padding:8px 12px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
        .panel-title{font-size:11px;font-weight:600;color:#fff}
        .badge{background:#252525;color:#888;padding:2px 6px;border-radius:3px;font-size:9px}
        .panel-body{padding:10px 12px;max-height:400px;overflow-y:auto}
        .proj{background:#151515;border:1px solid #2a2a2a;border-radius:4px;padding:8px 10px;margin-bottom:6px;cursor:pointer}
        .proj:hover{border-color:#444}
        .proj.neglected{border-left:3px solid #ef4444}
        .proj.active{border-left:3px solid #10b981}
        .proj.moderate{border-left:3px solid #f59e0b}
        .proj-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .proj-name{font-size:11px;font-weight:600;color:#ddd}
        .proj-status{font-size:9px;padding:2px 5px;border-radius:3px}
        .proj-status.neglected{background:#3d1515;color:#fca5a5}
        .proj-status.active{background:#153d1f;color:#6ee7b7}
        .proj-status.moderate{background:#3d3515;color:#fcd34d}
        .proj-meta{display:flex;gap:10px;font-size:10px;color:#666}
        .prog{margin-top:6px}
        .prog-lbl{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-bottom:2px}
        .prog-bar{height:3px;background:#252525;border-radius:2px;overflow:hidden}
        .prog-fill{height:100%;background:#6366f1;border-radius:2px}
        .timeline-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
        .timeline-name{width:80px;font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .timeline-bars{flex:1;display:flex;gap:1px;height:12px}
        .timeline-day{flex:1;border-radius:2px}
        .timeline-day.empty{background:#222}.timeline-day.low{background:#3d4a7a}.timeline-day.medium{background:#5566aa}.timeline-day.high{background:#6366f1}
        .btn{width:100%;padding:8px;background:#6366f1;border:none;border-radius:4px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;margin-top:8px}
        .btn:hover{background:#5558dd}
        .loading{text-align:center;padding:20px;color:#666}
        .spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:20px;color:#555}
        .empty-icon{font-size:24px;margin-bottom:8px}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
        .toast{position:fixed;bottom:12px;right:12px;background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:8px 12px;display:none;font-size:11px;z-index:200}
        .toast.success{border-color:#10b981}.toast.error{border-color:#ef4444}.toast.warning{border-color:#f59e0b}
        @media(max-width:900px){.grid{grid-template-columns:1fr}.stats{flex-wrap:wrap}.stat{min-width:45%}}
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-title">🎯 Focus</div>
        <div class="nav-links">
            <a href="/" class="nav-link">Tasks</a>
            <button class="nav-link" onclick="refreshData()">↻</button>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat"><div class="stat-val info" id="totalProjects">-</div><div class="stat-lbl">Projects</div></div>
            <div class="stat"><div class="stat-val ok" id="completedToday">-</div><div class="stat-lbl">Done Today</div></div>
            <div class="stat"><div class="stat-val warn" id="neglectedProjects">-</div><div class="stat-lbl">Neglected</div></div>
            <div class="stat"><div class="stat-val err" id="pendingTasks">-</div><div class="stat-lbl">Pending</div></div>
        </div>

        <div class="grid">
            <div>
                <div class="panel" style="margin-bottom:12px">
                    <div class="panel-hd"><span class="panel-title">🎯 Focus Next</span><span class="badge">Smart</span></div>
                    <div class="panel-body" id="suggestionPanel"><div class="loading"><div class="spinner"></div>Loading...</div></div>
                </div>
                <div class="panel">
                    <div class="panel-hd"><span class="panel-title">📊 7-Day Activity</span></div>
                    <div class="panel-body" id="timelinePanel"><div class="loading"><div class="spinner"></div>Loading...</div></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-hd"><span class="panel-title">📁 Projects</span><span class="badge" id="projectCount">-</span></div>
                <div class="panel-body" id="projectsPanel"><div class="loading"><div class="spinner"></div>Loading...</div></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><span id="toastMessage"></span></div>

    <script>
        // State
        let allProjects = [];
        let allTasks = [];
        let completedTasks = [];
        let projectAnalysis = [];
        let config = {
            token: '',
            cookieT: '',
            csrf: '',
            neglectedDays: 3
        };

        // Load config - uses shared tokens from main app
        function loadConfig() {
            // Get token from main app's shared localStorage
            config.token = localStorage.getItem('ticktick_token') || '';
            // Get V2 API credentials (for completed tasks)
            config.cookieT = localStorage.getItem('ticktick_cookie_t') || '';
            config.csrf = localStorage.getItem('ticktick_csrf') || '';
            
            // Get dashboard-specific settings
            const dashboardSettings = localStorage.getItem('focus_dashboard_settings');
            if (dashboardSettings) {
                const settings = JSON.parse(dashboardSettings);
                config.neglectedDays = settings.neglectedDays || 3;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'flex';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // API Calls
        async function fetchProjects() {
            if (!config.token) {
                return [];
            }
            try {
                const response = await fetch('https://api.ticktick.com/open/v1/project', {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch projects');
                return await response.json();
            } catch (error) {
                console.error('Error fetching projects:', error);
                showToast('Failed to fetch projects', 'error');
                return [];
            }
        }

        async function fetchTasksForProject(projectId) {
            if (!config.token) return [];
            try {
                const response = await fetch(`https://api.ticktick.com/open/v1/project/${projectId}/data`, {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch tasks');
                const data = await response.json();
                return data.tasks || [];
            } catch (error) {
                console.error('Error fetching tasks:', error);
                return [];
            }
        }

        // Fetch ALL completed tasks using V2 API (requires cookie auth)
        async function fetchAllCompletedTasksV2() {
            if (!config.cookieT || !config.csrf) {
                console.log('⚠️ V2 credentials not configured, skipping completed tasks fetch');
                console.log('Cookie T length:', config.cookieT?.length || 0);
                console.log('CSRF length:', config.csrf?.length || 0);
                return [];
            }
            
            try {
                // Build full cookie string
                const fullCookie = `t=${config.cookieT}; _csrf_token=${config.csrf}`;
                console.log('🔄 Fetching completed tasks with V2 API...');
                console.log('Cookie T (first 10 chars):', config.cookieT.substring(0, 10) + '...');
                
                // Use Vite proxy for local dev
                const response = await fetch(`/api/v2/project/all/closed?from=&to=&status=Completed`, {
                    method: 'GET',
                    headers: {
                        'x-full-cookie': fullCookie,
                        'x-csrf-token': config.csrf,
                        'x-tz': 'Asia/Calcutta',
                        'hl': 'en_US',
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ V2 API failed:', response.status, errorText);
                    return [];
                }
                
                const data = await response.json();
                console.log('✅ V2 Completed tasks fetched:', data.length);
                return data || [];
            } catch (error) {
                console.error('❌ Error fetching completed tasks via V2:', error);
                return [];
            }
        }

        // Analysis Functions
        
        // Get today's completions per project (for Daily Touch Bonus)
        function getTodayCompletionsPerProject() {
            const today = new Date().toISOString().split('T')[0];
            const todayCompletions = {};
            
            completedTasks.forEach(task => {
                if (task.completedTime?.startsWith(today)) {
                    const pid = task.projectId;
                    todayCompletions[pid] = (todayCompletions[pid] || 0) + 1;
                }
            });
            
            return todayCompletions;
        }
        
        // Get Daily Touch Bonus for a project
        function getDailyTouchBonus(projectId) {
            const todayCompletions = getTodayCompletionsPerProject();
            const count = todayCompletions[projectId] || 0;
            
            if (count === 0) return 50;  // Untouched today
            if (count === 1) return 30;  // 1 task done
            if (count === 2) return 15;  // 2 tasks done
            return 0;                     // 3+ tasks done
        }
        
        // Base Score Lookup Table (Priority + Day)
        function getBaseScore(priority, dueStatus) {
            // Priority: 5=High, 3=Medium, 1=Low, 0=None
            // dueStatus: 'overdue', 'today', 'future', 'none'
            
            const scoreTable = {
                // High Priority
                '5_overdue': 400,
                '5_today': 350,
                // Medium Priority  
                '3_overdue': 300,
                '3_today': 250,
                // Low Priority
                '1_overdue': 200,
                '1_today': 150,
                // None Priority
                '0_overdue': 120,
                '0_today': 80
            };
            
            const key = `${priority}_${dueStatus}`;
            return scoreTable[key] || 0;  // Return 0 for future/none dates
        }
        
        // Overdue Severity Score - the further past deadline, the higher the bonus
        function calculateOverdueSeverity(task) {
            if (!task.dueDate) return { bonus: 0, daysOverdue: 0 };
            
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const dueDateStr = task.dueDate.split('T')[0];
            const dueDate = new Date(dueDateStr);
            const today = new Date(todayStr);
            
            // Calculate days overdue (only positive values)
            const diffTime = today - dueDate;
            const daysOverdue = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (daysOverdue <= 0) return { bonus: 0, daysOverdue: 0 };
            
            // Bonus: 10 points per day overdue, capped at 140 (14 days)
            const bonus = Math.min(daysOverdue * 10, 140);
            
            return { bonus, daysOverdue };
        }
        
        // Quick Win Bonus - small bonus for short duration tasks (tiebreaker)
        function calculateDurationBonus(task) {
            // Duration in TickTick is stored in seconds
            const durationSeconds = task.duration || 0;
            const durationMinutes = durationSeconds / 60;
            
            if (durationMinutes <= 0) return { bonus: 0, durationMinutes: 0, label: '' };
            
            // Quick win bonuses (small, just for tiebreaking)
            if (durationMinutes <= 15) {
                return { bonus: 15, durationMinutes, label: '⚡ Quick' };
            } else if (durationMinutes <= 30) {
                return { bonus: 5, durationMinutes, label: '🏃 Short' };
            } else if (durationMinutes <= 60) {
                return { bonus: 0, durationMinutes, label: '⏱️ 1hr' };
            } else {
                return { bonus: 0, durationMinutes, label: `🕐 ${Math.round(durationMinutes/60)}hr` };
            }
        }
        
        // Format duration for display
        function formatDuration(minutes) {
            if (!minutes || minutes <= 0) return '';
            if (minutes < 60) return `${Math.round(minutes)}m`;
            const hrs = Math.floor(minutes / 60);
            const mins = Math.round(minutes % 60);
            return mins > 0 ? `${hrs}h${mins}m` : `${hrs}h`;
        }
        
        // Calculate individual task score
        function calculateTaskScore(task, projectId) {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            // Determine due status (only 'overdue' or 'today' get scores)
            let dueStatus = 'none';
            if (task.dueDate) {
                const dueDate = new Date(task.dueDate);
                const dueDateStr = task.dueDate.split('T')[0];
                
                if (dueDate < now && dueDateStr !== todayStr) {
                    dueStatus = 'overdue';
                } else if (dueDateStr === todayStr) {
                    dueStatus = 'today';
                } else {
                    dueStatus = 'future';  // Tomorrow or later - score 0
                }
            }
            
            // Get base score from lookup table
            const priority = task.priority || 0;
            const baseScore = getBaseScore(priority, dueStatus);
            
            // Get Overdue Severity Bonus (NEW)
            const overdueInfo = calculateOverdueSeverity(task);
            
            // Get Quick Win Duration Bonus (NEW)
            const durationInfo = calculateDurationBonus(task);
            
            // Get Daily Touch Bonus
            const touchBonus = getDailyTouchBonus(projectId);
            
            // Return total score with breakdown info
            const totalScore = baseScore + overdueInfo.bonus + durationInfo.bonus + touchBonus;
            
            return {
                total: totalScore,
                breakdown: {
                    base: baseScore,
                    overdue: overdueInfo.bonus,
                    duration: durationInfo.bonus,
                    touch: touchBonus
                },
                daysOverdue: overdueInfo.daysOverdue,
                durationMinutes: durationInfo.durationMinutes,
                durationLabel: durationInfo.label
            };
        }
        
        // Get Score Tier for round-robin grouping
        function getScoreTier(score) {
            if (score >= 400) return { tier: 1, name: '🔴 Very Critical', color: '#ef4444' };
            if (score >= 300) return { tier: 2, name: '🟠 Critical', color: '#f97316' };
            if (score >= 200) return { tier: 3, name: '🟡 Urgent', color: '#fbbf24' };
            if (score >= 100) return { tier: 4, name: '🟢 Important', color: '#10b981' };
            return { tier: 5, name: '⚪ Backlog', color: '#6b7280' };
        }
        
        // Calculate project attention score (weighted recency + consistency)
        function calculateProjectAttentionScore(project) {
            const now = new Date();
            let weightedActivityScore = 0;
            let consistencyDays = 0;
            
            // Look at last 7 days
            for (let i = 0; i < 7; i++) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                
                // Count completions on this day
                const completionsOnDay = completedTasks.filter(t => 
                    t.projectId === project.id && 
                    t.completedTime?.startsWith(dateStr)
                ).length;
                
                // Weight: Today = 1.0, Yesterday = 0.85, etc.
                const weight = Math.pow(0.85, i);
                weightedActivityScore += completionsOnDay * weight;
                
                // Track consistency
                if (completionsOnDay > 0) consistencyDays++;
            }
            
            // Consistency bonus (0-20 points)
            const consistencyBonus = (consistencyDays / 7) * 20;
            
            // Final attention needed (higher = needs more attention)
            const attentionNeeded = Math.max(0, 50 - weightedActivityScore) 
                                  - consistencyBonus 
                                  + (project.pendingCount * 0.5);
            
            return {
                attentionNeeded: Math.round(attentionNeeded),
                weightedActivity: weightedActivityScore.toFixed(1),
                consistencyDays,
                consistencyPercent: Math.round((consistencyDays / 7) * 100)
            };
        }
        
        // Check if over-focused on one project today
        function checkProjectBalance() {
            const today = new Date().toISOString().split('T')[0];
            
            // Count today's completions per project
            const todayCompletions = {};
            completedTasks.forEach(task => {
                if (task.completedTime?.startsWith(today)) {
                    const pid = task.projectId;
                    todayCompletions[pid] = (todayCompletions[pid] || 0) + 1;
                }
            });
            
            // Find most worked project today
            let maxProject = null;
            let maxCount = 0;
            let totalToday = 0;
            
            Object.entries(todayCompletions).forEach(([pid, count]) => {
                totalToday += count;
                if (count > maxCount) {
                    maxCount = count;
                    maxProject = pid;
                }
            });
            
            // Over-focused if 3+ tasks in one project AND it's 70%+ of today's work
            const isOverFocused = maxCount >= 3 && totalToday > 0 && (maxCount / totalToday) > 0.7;
            
            return {
                isOverFocused,
                overFocusedProjectId: isOverFocused ? maxProject : null,
                todayCompletions,
                totalToday
            };
        }
        
        // Get all pending tasks sorted by score with tier-based round-robin
        function getAllPendingTasksSorted(excludeProjectId = null) {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const pendingTasks = [];
            
            projectAnalysis.forEach(project => {
                if (excludeProjectId && project.id === excludeProjectId) return;
                
                project.allPendingTasks?.forEach(task => {
                    // Only include tasks due TODAY or OVERDUE
                    let isOverdue = false;
                    let isDueToday = false;
                    
                    if (task.dueDate) {
                        const dueDateStr = task.dueDate.split('T')[0];
                        const dueDate = new Date(task.dueDate);
                        
                        isDueToday = dueDateStr === todayStr;
                        isOverdue = dueDate < now && !isDueToday;
                    }
                    
                    // Skip tasks that are not due today or overdue
                    if (!isOverdue && !isDueToday) return;
                    
                    const scoreResult = calculateTaskScore(task, project.id);
                    const taskScore = scoreResult.total;
                    const tierInfo = getScoreTier(taskScore);
                    
                    pendingTasks.push({
                        ...task,
                        projectName: project.name,
                        projectId: project.id,
                        score: taskScore,
                        scoreBreakdown: scoreResult.breakdown,
                        daysOverdue: scoreResult.daysOverdue,
                        durationMinutes: scoreResult.durationMinutes,
                        durationLabel: scoreResult.durationLabel,
                        tier: tierInfo.tier,
                        tierName: tierInfo.name,
                        tierColor: tierInfo.color,
                        isOverdue,
                        isDueToday
                    });
                });
            });
            
            // STEP 1: Group tasks by tier
            const tierGroups = {};
            pendingTasks.forEach(task => {
                if (!tierGroups[task.tier]) {
                    tierGroups[task.tier] = [];
                }
                tierGroups[task.tier].push(task);
            });
            
            // STEP 2: Within each tier, apply round-robin by project
            const sortedTasks = [];
            const tiers = Object.keys(tierGroups).sort((a, b) => a - b); // Tier 1 first
            
            tiers.forEach(tier => {
                const tasksInTier = tierGroups[tier];
                
                // Group by project within this tier
                const projectGroups = {};
                tasksInTier.forEach(task => {
                    if (!projectGroups[task.projectId]) {
                        projectGroups[task.projectId] = [];
                    }
                    projectGroups[task.projectId].push(task);
                });
                
                // Sort tasks within each project by score (highest first)
                Object.values(projectGroups).forEach(tasks => {
                    tasks.sort((a, b) => b.score - a.score);
                });
                
                // Round-robin: take one from each project, repeat
                const projectIds = Object.keys(projectGroups);
                let hasMore = true;
                let index = 0;
                
                while (hasMore) {
                    hasMore = false;
                    for (const pid of projectIds) {
                        if (projectGroups[pid].length > index) {
                            sortedTasks.push(projectGroups[pid][index]);
                            hasMore = true;
                        }
                    }
                    index++;
                }
            });
            
            return sortedTasks;
        }
        
        // Get smart suggestion with tier-based round-robin
        function getSmartSuggestion() {
            const allTasks = getAllPendingTasksSorted();
            const todayCompletions = getTodayCompletionsPerProject();
            
            // Calculate total completed today
            const totalCompletedToday = Object.values(todayCompletions).reduce((a, b) => a + b, 0);
            
            if (allTasks.length === 0) {
                return { type: 'empty', alert: null, tasks: [], reason: '' };
            }
            
            // Count overdue and today tasks
            const overdueTasks = allTasks.filter(t => t.isOverdue);
            const dueTodayTasks = allTasks.filter(t => t.isDueToday);
            
            // Determine alert type based on what's in the list
            let alertType = 'success';
            let alert = '';
            let reason = '';
            
            if (overdueTasks.length > 0) {
                alertType = 'danger';
                alert = `🚨 ${overdueTasks.length} OVERDUE task(s)!`;
                reason = 'Tasks sorted by Priority → Project rotation';
            } else if (dueTodayTasks.length > 0) {
                alertType = 'warning';
                alert = `🔥 ${dueTodayTasks.length} task(s) due TODAY`;
                reason = 'Tasks sorted by Priority → Project rotation';
            } else {
                alertType = 'success';
                alert = '✅ No urgent tasks!';
                reason = 'All tasks are for future dates';
            }
            
            // Count unique projects in task list
            const uniqueProjects = [...new Set(allTasks.map(t => t.projectId))];
            
            // Build summary info
            const tierSummary = {};
            allTasks.forEach(t => {
                tierSummary[t.tierName] = (tierSummary[t.tierName] || 0) + 1;
            });
            
            return {
                type: overdueTasks.length > 0 ? 'overdue' : 'due-today',
                alert,
                alertType,
                tasks: allTasks.slice(0, 5),  // Show top 5
                reason,
                stats: {
                    totalTasks: allTasks.length,
                    overdue: overdueTasks.length,
                    dueToday: dueTodayTasks.length,
                    projectsInvolved: uniqueProjects.length,
                    completedToday: totalCompletedToday,
                    tierSummary
                }
            };
        }
        
        function analyzeProjects() {
            const now = new Date();

            projectAnalysis = allProjects.map(project => {
                const projectTasks = allTasks.filter(t => t.projectId === project.id);
                const projectCompleted = completedTasks.filter(t => t.projectId === project.id);
                
                // Get last completion date
                let lastCompletion = null;
                let daysSinceLastCompletion = Infinity;
                
                if (projectCompleted.length > 0) {
                    const completionDates = projectCompleted
                        .filter(t => t.completedTime)
                        .map(t => new Date(t.completedTime))
                        .sort((a, b) => b - a);
                    
                    if (completionDates.length > 0) {
                        lastCompletion = completionDates[0];
                        daysSinceLastCompletion = Math.floor((now - lastCompletion) / (24 * 60 * 60 * 1000));
                    }
                }

                // Count completions in last 7 days
                const sevenDaysAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                const recentCompletions = projectCompleted.filter(t => {
                    if (!t.completedTime) return false;
                    return new Date(t.completedTime) > sevenDaysAgo;
                }).length;

                // All pending tasks (not just top 5)
                const pendingTasks = projectTasks.filter(t => t.status !== 2);
                const highPriority = pendingTasks.filter(t => t.priority === 5).length;
                const mediumPriority = pendingTasks.filter(t => t.priority === 3).length;
                const lowPriority = pendingTasks.filter(t => t.priority === 1 || t.priority === 0).length;

                // Overdue and due soon counts
                const todayStr = now.toISOString().split('T')[0];
                
                const overdueTasks = pendingTasks.filter(t => {
                    if (!t.dueDate) return false;
                    const dueDateStr = t.dueDate.split('T')[0];
                    // Overdue = due date is BEFORE today (not including today)
                    return dueDateStr < todayStr;
                }).length;
                
                const dueTodayTasks = pendingTasks.filter(t => {
                    if (!t.dueDate) return false;
                    const dueDateStr = t.dueDate.split('T')[0];
                    return dueDateStr === todayStr;
                }).length;

                const threeDaysFromNow = new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000);
                const dueSoon = pendingTasks.filter(t => {
                    if (!t.dueDate) return false;
                    const due = new Date(t.dueDate);
                    return due <= threeDaysFromNow && due >= now;
                }).length;

                // Calculate smart attention score
                const attentionScore = calculateProjectAttentionScore({ 
                    id: project.id, 
                    pendingCount: pendingTasks.length 
                });

                // Determine status
                let status = 'active';
                if (daysSinceLastCompletion > config.neglectedDays && pendingTasks.length > 0) {
                    status = 'neglected';
                } else if (daysSinceLastCompletion > 1 && pendingTasks.length > 0) {
                    status = 'moderate';
                }

                // Daily completions for timeline
                const dailyCompletions = {};
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(now);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    dailyCompletions[dateStr] = 0;
                }
                
                projectCompleted.forEach(task => {
                    if (task.completedTime) {
                        const dateStr = task.completedTime.split('T')[0];
                        if (dailyCompletions.hasOwnProperty(dateStr)) {
                            dailyCompletions[dateStr]++;
                        }
                    }
                });

                return {
                    ...project,
                    pendingCount: pendingTasks.length,
                    completedCount: projectCompleted.length,
                    lastCompletion,
                    daysSinceLastCompletion,
                    recentCompletions,
                    highPriority,
                    mediumPriority,
                    lowPriority,
                    overdueTasks,
                    dueTodayTasks,
                    dueSoon,
                    attentionScore,
                    focusScore: attentionScore.attentionNeeded,
                    status,
                    dailyCompletions,
                    allPendingTasks: pendingTasks,
                    pendingTasks: pendingTasks.slice(0, 5)
                };
            });

            // Sort by attention needed (highest first)
            projectAnalysis.sort((a, b) => b.attentionScore.attentionNeeded - a.attentionScore.attentionNeeded);
        }

        // Render Functions
        function renderStats() {
            const totalProjects = allProjects.length;
            const today = new Date().toISOString().split('T')[0];
            const completedToday = completedTasks.filter(t => 
                t.completedTime && t.completedTime.startsWith(today)
            ).length;
            const neglected = projectAnalysis.filter(p => p.status === 'neglected').length;
            const pending = allTasks.filter(t => t.status !== 2).length;

            document.getElementById('totalProjects').textContent = totalProjects;
            document.getElementById('completedToday').textContent = completedToday;
            document.getElementById('neglectedProjects').textContent = neglected;
            document.getElementById('pendingTasks').textContent = pending;
        }

        function renderSuggestion() {
            const panel = document.getElementById('suggestionPanel');
            
            if (projectAnalysis.length === 0) {
                panel.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No projects. Configure token first.</p></div>`;
                return;
            }

            const suggestion = getSmartSuggestion();
            
            if (suggestion.type === 'empty') {
                panel.innerHTML = `<div class="empty"><div class="empty-icon">🎉</div><p>All caught up!</p></div>`;
                return;
            }

            const alertBg = {danger:'#2a1515',warning:'#2a2515',info:'#15152a',success:'#152a1f'};
            const alertClr = {danger:'#fca5a5',warning:'#fcd34d',info:'#a5b4fc',success:'#6ee7b7'};

            panel.innerHTML = `
                <div style="padding:8px 10px;border-radius:4px;margin-bottom:10px;background:${alertBg[suggestion.alertType]};color:${alertClr[suggestion.alertType]}">
                    <div style="font-weight:600;font-size:11px">${suggestion.alert}</div>
                </div>
                ${suggestion.stats ? `
                <div style="display:flex;gap:6px;margin-bottom:10px;font-size:10px">
                    <div style="background:#2a1515;padding:4px 8px;border-radius:3px;text-align:center"><span style="font-weight:700;color:#fca5a5">${suggestion.stats.overdue}</span> overdue</div>
                    <div style="background:#2a2515;padding:4px 8px;border-radius:3px;text-align:center"><span style="font-weight:700;color:#fcd34d">${suggestion.stats.dueToday}</span> today</div>
                    <div style="background:#152a1f;padding:4px 8px;border-radius:3px;text-align:center"><span style="font-weight:700;color:#6ee7b7">${suggestion.stats.completedToday}</span> done</div>
                </div>` : ''}
                ${suggestion.tasks.map((task, i) => `
                    <div style="background:#151515;border-radius:4px;padding:8px;margin-bottom:6px;border-left:3px solid ${task.tierColor}">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px">
                            <span style="color:#555;font-size:10px">${i+1}</span>
                            <span style="flex:1;font-size:11px;color:#ddd;font-weight:500">${task.title}</span>
                            ${task.durationLabel ? `<span style="background:#1a2a3a;color:#7dd3fc;padding:1px 5px;border-radius:2px;font-size:9px">${task.durationLabel}</span>` : ''}
                            <span style="background:${task.tierColor}22;color:${task.tierColor};padding:1px 5px;border-radius:2px;font-size:9px" title="Base:${task.scoreBreakdown?.base || 0} +OD:${task.scoreBreakdown?.overdue || 0} +Dur:${task.scoreBreakdown?.duration || 0} +Touch:${task.scoreBreakdown?.touch || 0}">${task.score}</span>
                        </div>
                        <div style="display:flex;gap:8px;font-size:9px;color:#666;margin-top:4px;margin-left:14px">
                            <span>${task.projectName}</span>
                            <span style="color:${task.isOverdue ? '#fca5a5' : '#fcd34d'}">${task.isOverdue ? (task.daysOverdue > 1 ? `${task.daysOverdue}d OVERDUE` : 'OVERDUE') : 'Today'}</span>
                            ${task.durationMinutes > 0 ? `<span style="color:#7dd3fc">${formatDuration(task.durationMinutes)}</span>` : ''}
                        </div>
                    </div>
                `).join('')}
                ${suggestion.tasks.length > 0 ? `<button class="btn" onclick="goToProject('${suggestion.tasks[0].projectId}')">Start: ${suggestion.tasks[0].title}</button>` : ''}
            `;
        }

        function renderProjects() {
            const panel = document.getElementById('projectsPanel');
            document.getElementById('projectCount').textContent = projectAnalysis.length;

            if (projectAnalysis.length === 0) {
                panel.innerHTML = `<div class="empty"><div class="empty-icon">📁</div><p>No projects</p></div>`;
                return;
            }

            panel.innerHTML = projectAnalysis.map(project => `
                <div class="proj ${project.status}" onclick="goToProject('${project.id}')">
                    <div class="proj-hd">
                        <span class="proj-name">${project.name}</span>
                        <span class="proj-status ${project.status}">${project.status === 'neglected' ? '⚠' : project.status === 'moderate' ? '•' : '✓'}</span>
                    </div>
                    <div class="proj-meta">
                        <span>${project.pendingCount} pending</span>
                        <span>${project.recentCompletions}/wk</span>
                        ${project.overdueTasks > 0 ? `<span style="color:#fca5a5">${project.overdueTasks} late</span>` : ''}
                    </div>
                    ${project.pendingCount > 0 ? `
                        <div class="prog">
                            <div class="prog-lbl"><span>Focus</span><span>${project.attentionScore.attentionNeeded}</span></div>
                            <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(project.attentionScore.attentionNeeded, 100)}%"></div></div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function renderTimeline() {
            const panel = document.getElementById('timelinePanel');
            
            if (projectAnalysis.length === 0) {
                panel.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>No data</p></div>`;
                return;
            }

            const dates = [];
            const now = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                dates.push({
                    full: date.toISOString().split('T')[0],
                    short: date.toLocaleDateString('en', { weekday: 'narrow' })
                });
            }

            const timelineProjects = projectAnalysis.slice(0, 8);

            panel.innerHTML = `
                <div style="display:flex;margin-left:88px;margin-bottom:4px">
                    ${dates.map(d => `<div style="flex:1;text-align:center;font-size:9px;color:#555">${d.short}</div>`).join('')}
                </div>
                ${timelineProjects.map(project => `
                    <div class="timeline-row">
                        <div class="timeline-name" title="${project.name}">${project.name}</div>
                        <div class="timeline-bars">
                            ${dates.map(d => {
                                const count = project.dailyCompletions[d.full] || 0;
                                let level = 'empty';
                                if (count >= 3) level = 'high';
                                else if (count === 2) level = 'medium';
                                else if (count === 1) level = 'low';
                                return `<div class="timeline-day ${level}" title="${count}"></div>`;
                            }).join('')}
                        </div>
                    </div>
                `).join('')}
            `;
        }

        // Utility Functions
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = date - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Tomorrow';
            if (days < 0) return `${Math.abs(days)}d overdue`;
            return `In ${days}d`;
        }

        function formatDaysAgo(days) {
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days === Infinity) return 'Never';
            return `${days}d ago`;
        }

        function goToProject(projectId) {
            // Navigate to main app with project filter
            window.location.href = `/?project=${projectId}`;
        }

        // Main Load Function
        async function refreshData() {
            showToast('Loading data...', 'info');
            
            // Reset state
            allProjects = [];
            allTasks = [];
            completedTasks = [];
            projectAnalysis = [];

            // Fetch projects first
            allProjects = await fetchProjects();
            
            if (allProjects.length === 0) {
                renderStats();
                renderSuggestion();
                renderProjects();
                renderTimeline();
                return;
            }

            // Fetch pending tasks for each project (Open API)
            const taskPromises = allProjects.map(async (project) => {
                const tasks = await fetchTasksForProject(project.id);
                return { projectId: project.id, tasks };
            });

            const results = await Promise.all(taskPromises);
            
            results.forEach(({ projectId, tasks }) => {
                tasks.forEach(t => t.projectId = projectId);
                allTasks.push(...tasks);
            });

            // Fetch ALL completed tasks using V2 API (better data!)
            completedTasks = await fetchAllCompletedTasksV2();
            console.log('📊 Total completed tasks loaded:', completedTasks.length);

            // Analyze and render
            analyzeProjects();
            renderStats();
            renderSuggestion();
            renderProjects();
            renderTimeline();
            
            showToast('Dashboard updated!', 'success');
        }

        // Initialize
        window.onload = function() {
            loadConfig();
            if (config.token) {
                refreshData();
            } else {
                document.getElementById('suggestionPanel').innerHTML = `
                    <div class="empty"><div class="empty-icon">🔑</div><p>Configure token in main app</p>
                    <a href="/" class="btn" style="max-width:150px;margin:10px auto 0;display:block;text-decoration:none">Setup</a></div>
                `;
                document.getElementById('projectsPanel').innerHTML = `<div class="empty"><div class="empty-icon">📁</div><p>No projects</p></div>`;
                document.getElementById('timelinePanel').innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>No data</p></div>`;
            }
        };
    </script>
</body>
</html>
